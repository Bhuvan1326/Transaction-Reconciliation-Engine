openapi: 3.0.0

info:
  title: Transaction Reconciliation Engine API
  version: 1.0.0
  description: API for reconciling user and exchange transaction CSV files

servers:
  - url: http://localhost:3000
    description: Local development

  - url: https://transaction-reconciliation-engine-fna4.onrender.com
    description: Production

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check
      responses:
        200:
          description: Service health status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  uptime:
                    type: number
                  timestamp:
                    type: string

  /api/v1/reconcile:
    post:
      tags:
        - Reconciliation
      summary: Start reconciliation job
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - userFile
                - exchangeFile
              properties:
                userFile:
                  type: string
                  format: binary
                  description: User transactions CSV

                exchangeFile:
                  type: string
                  format: binary
                  description: Exchange transactions CSV

                timestampToleranceSeconds:
                  type: integer
                  default: 300

                quantityTolerancePct:
                  type: number
                  default: 0.01

      responses:
        202:
          description: Reconciliation job accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  runId:
                    type: string
                  status:
                    type: string

        400:
          description: Validation error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string

  /api/v1/reconcile/{runId}:
    get:
      tags:
        - Reconciliation
      summary: Get reconciliation run status

      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string

      responses:
        200:
          description: Run status and summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  runId:
                    type: string

                  status:
                    type: string

                  startedAt:
                    type: string

                  completedAt:
                    type: string

                  config:
                    type: object
                    properties:
                      timestampToleranceSeconds:
                        type: integer

                      quantityTolerancePct:
                        type: number

                  summary:
                    type: object
                    properties:
                      totalUser:
                        type: integer

                      totalExchange:
                        type: integer

                      matched:
                        type: integer

                      conflicting:
                        type: integer

                      unmatchedUser:
                        type: integer

                      unmatchedExchange:
                        type: integer

                      dataQualityIssues:
                        type: integer

                  reportPath:
                    type: string

        404:
          description: Run not found

  /api/v1/reconcile/{runId}/report:
    get:
      tags:
        - Reconciliation
      summary: Download reconciliation report CSV

      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string

      responses:
        200:
          description: CSV report stream
          content:
            text/csv:
              schema:
                type: string

        404:
          description: Report not found

  /api/v1/reconcile/{runId}/issues:
    get:
      tags:
        - Reconciliation
      summary: Get paginated data quality issues

      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string

        - in: query
          name: page
          schema:
            type: integer
            default: 1

        - in: query
          name: limit
          schema:
            type: integer
            default: 50

      responses:
        200:
          description: Paginated quality issues
          content:
            application/json:
              schema:
                type: object
                properties:
                  runId:
                    type: string

                  page:
                    type: integer

                  limit:
                    type: integer

                  total:
                    type: integer

                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        source:
                          type: string

                        rowIndex:
                          type: integer

                        transactionId:
                          type: string

                        reason:
                          type: string

                        severity:
                          type: string

        404:
          description: Run not found